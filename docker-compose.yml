services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dragon
      POSTGRES_PASSWORD: dragon
      POSTGRES_DB: dragon_market
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dragon -d dragon_market"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: "postgres://dragon:dragon@postgres:5432/dragon_market?sslmode=disable"
      # Spec default is 24h; shortened here so a reviewer can watch an auction
      # settle in the console without waiting. Both are configurable.
      AUCTION_WINDOW: "2m"
      AUCTION_EXTENSION: "30s"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
